<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>⚖️ Legal Document AI Assistant</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        /* HEADER */

        header {
            height: 60px;
            background: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            font-size: 1.4em;
            font-weight: bold;
        }

        /* MAIN LAYOUT */

        .container {
            display: flex;
            height: calc(100vh - 60px);
            width: 100%;
        }

        /* LEFT PANEL */

        .left {
            flex: 1;
            background: #020617;
        }

        .left iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* RIGHT PANEL */

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e293b;
        }

        /* UPLOAD AREA */

        .upload-section {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upload-container input {
            display: none;
        }

        .upload-label {
            background: #1f2937;
            padding: 10px;
            border-radius: 999px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #334155;
        }

        .upload-label:hover {
            background: #2563eb;
        }

        #uploadBtn {
            background: #2563eb;
            border: none;
            padding: 10px;
            border-radius: 999px;
            cursor: pointer;
            color: white;
        }

        #uploadBtn:hover {
            background: #1d4ed8;
        }

        .status {
            font-size: 0.85em;
            color: #94a3b8;
        }

        /* RESULT */

        .result {
            font-size: 0.85em;
            margin-top: 10px;
            color: #cbd5f5;
        }

        /* CHAT AREA */

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* CHAT WINDOW */

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* MESSAGE */

        .chat-message {
            display: flex;
        }

        .user-message {
            justify-content: flex-end;
        }

        .agent-message {
            justify-content: flex-start;
        }

        /* BUBBLES */

        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 15px;
            line-height: 1.4;
        }

        .user-message .bubble {
            background: #2563eb;
            border-bottom-right-radius: 5px;
        }

        .agent-message .bubble {
            background: #334155;
            border-bottom-left-radius: 5px;
        }

        /* AGENT REASONING */

        .reasoning {
            font-size: 0.7em;
            color: #94a3b8;
            margin-top: 3px;
        }

        /* CHAT INPUT */

        .chat-input-container {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid #334155;
        }

        .chat-input-container input {
            flex: 1;
            padding: 10px;
            border-radius: 999px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            outline: none;
        }

        .chat-input-container button {
            background: #2563eb;
            border: none;
            border-radius: 999px;
            padding: 0 18px;
            cursor: pointer;
            color: white;
        }

        .chat-input-container button:hover {
            background: #1d4ed8;
        }

        /* PROGRESS */

        .progress {
            height: 8px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width .3s;
        }
    </style>
</head>

<body>

    <header>⚖️ Legal Document AI Assistant</header>

    <div class="container">

        <!-- LEFT PANEL -->
        <div class="left">
            <iframe id="pdfPreview"></iframe>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right">

            <!-- UPLOAD -->
            <div class="upload-section">

                <h3>Upload Document</h3>

                <div class="upload-group">

                    <div class="upload-container">
                        <input type="file" id="documentInput" accept=".pdf">
                        <label class="upload-label" for="documentInput">📄 Select PDF</label>
                    </div>

                    <span id="selectedFile" style="font-size:.85em;color:#cbd5f5"></span>

                    <button id="uploadBtn" onclick="uploadDocument()">Upload</button>

                    <div class="status" id="uploadStatus">No file uploaded.</div>

                    <div class="progress" id="ragProgress" style="display:none;">
                        <div class="progress-bar" id="ragProgressBar"></div>
                    </div>

                    <div class="result" id="classificationResult" style="display:none;">
                        <strong>Category:</strong> <span id="category"></span><br>
                        <strong>Confidence:</strong> <span id="confidence"></span><br>
                        <div id="reasoning"></div>
                    </div>

                </div>
            </div>

            <!-- CHAT -->
            <div class="chat-section">

                <div class="chat-window" id="chatWindow"></div>

                <div class="chat-input-container">
                    <input type="text" id="questionInput" placeholder="Ask about this document...">
                    <button onclick="askQuestion()">Ask</button>
                </div>

            </div>

        </div>
    </div>

    <script>

        let ragReady = false;

        document.getElementById("documentInput").addEventListener("change", function () {

            const file = this.files[0];
            if (!file) return;

            document.getElementById("selectedFile").innerText = "Selected: " + file.name;

            const reader = new FileReader();

            reader.onload = e => {
                document.getElementById("pdfPreview").src = e.target.result;
            }

            reader.readAsDataURL(file);

        })

        function scrollChat() {
            const chat = document.getElementById("chatWindow");
            chat.scrollTop = chat.scrollHeight;
        }

        /* UPLOAD */

       async function uploadDocument() {

            const input = document.getElementById("documentInput");

            if (!input.files.length) {
                alert("Select file first");
                return;
            }

            const file = input.files[0];
            const formData = new FormData();
            formData.append("document", file);

            const status = document.getElementById("uploadStatus");

            try {
                status.innerText = "Uploading...";

                const res = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) {
                    throw new Error("Server error: " + res.status);
                }

                const data = await res.json();

                if (!data.success) {
                    throw new Error(data.message || "Upload failed");
                }

                status.innerText = data.message;

                document.getElementById("category").innerText = data.category || "N/A";
                document.getElementById("confidence").innerText = data.confidence || "N/A";
                document.getElementById("reasoning").innerText = data.reasoning || "";

                document.getElementById("classificationResult").style.display = "block";

                startRagProgress();

            } catch (err) {
                console.error(err);
                status.innerText = "❌ Error: " + err.message;
            }
        }
        /* PROGRESS */

        function startRagProgress() {

            document.getElementById("ragProgress").style.display = "block";

            let progress = 0;

            const interval = setInterval(() => {

                progress += 10;

                document.getElementById("ragProgressBar").style.width = progress + "%";

                if (progress >= 100) {
                    clearInterval(interval);
                    ragReady = true;
                }

            }, 500)

        }

        /* ASK */

        function askQuestion() {

            const question = document.getElementById("questionInput").value.trim();

            if (!question) return;

            const chat = document.getElementById("chatWindow");

            const user = document.createElement("div");
            user.className = "chat-message user-message";
            user.innerHTML = `<div class="bubble">${question}</div>`;
            chat.appendChild(user);

            scrollChat();

            document.getElementById("questionInput").value = "";

            /* AGENT */

            const agent = document.createElement("div");

            agent.className = "chat-message agent-message";

            agent.innerHTML = `
<div>
<div class="bubble">Thinking...</div>
<div class="reasoning">Analyzing document</div>
</div>
`;

            chat.appendChild(agent);

            scrollChat();

            const formData = new FormData();
            formData.append("question", question);

            fetch("/ask", { method: "POST", body: formData })
                .then(res => res.json())
                .then(data => {
                    agent.querySelector(".bubble").innerText = data.answer;
                    agent.querySelector(".reasoning").innerText = "Engine: " + data.engine;
                    scrollChat();
                })
                .catch(err => {
                    agent.querySelector(".bubble").innerText = "Error getting response.";
                    agent.querySelector(".reasoning").innerText = err.message;
                });

        }

    </script>

</body>

</html>
